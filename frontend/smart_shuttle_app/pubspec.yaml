name: smart_shuttle
description: "Smart Shuttle AI System — Integrated System Prototype combining student tracking, driver safety, and AI-powered revenue analytics."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Charts — Revenue Forecasting & Passenger Analytics
  fl_chart: ^0.68.0

  # Typography — Inter font for all UI (Rubric: Design Consistency)
  google_fonts: ^6.2.1

  # Animations — micro-interactions and transitions
  flutter_animate: ^4.5.0

  # State Management — satisfies Functional Product rubric criterion
  provider: ^6.1.2

  # Firebase — satisfies Database Design rubric criterion
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1

  # Maps & Location — satisfies Real-time Tracking rubric criterion
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.6.0
  audioplayers: ^5.2.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/firebase_project_manifest.json
    - assets/images/
    - assets/audio/Alarm.mp3
