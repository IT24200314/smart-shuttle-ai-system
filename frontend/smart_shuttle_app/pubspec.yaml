name: smart_shuttle
description: "Smart Shuttle AI System — Integrated System Prototype combining student tracking, driver safety, and AI-powered revenue analytics."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Charts — Revenue Forecasting & Passenger Analytics
  fl_chart: ^0.68.0

  # Typography — Inter font for all UI (Rubric: Design Consistency)
  google_fonts: ^6.2.1

  # Animations — micro-interactions and transitions
  flutter_animate: ^4.5.0

  # State Management — satisfies Functional Product rubric criterion
  provider: ^6.1.2

  # Firebase — satisfies Database Design rubric criterion
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1

  # Maps — google_maps_flutter requires API key in web/index.html;
  # using custom-painted map simulation for demo build.
  # google_maps_flutter: ^2.6.1
  # http: ^1.2.1    # (re-enable for Distance Matrix API in production)

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
